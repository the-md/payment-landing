<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div style="display:flex;border-bottom:1px solid #e2e8f0">
    <button style="display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;font-weight:600;border:0;background:transparent;border-bottom:2px solid #2563eb;color:#2563eb;margin-bottom:-1px;cursor:pointer">
      <span class="dot pending"></span>
      Ближайшие (30 дней)
      <span style="font-size:11px;padding:1px 8px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:600">8</span>
    </button>
    <button style="display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;font-weight:600;border:0;background:transparent;border-bottom:2px solid transparent;color:#64748b;margin-bottom:-1px;cursor:pointer">
      <span class="dot overdue"></span>
      Просроченные
      <span style="font-size:11px;padding:1px 8px;border-radius:999px;background:#f1f5f9;color:#64748b;font-weight:600">3</span>
    </button>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Bottom-border tab bar with colored dot + count pill. Active tab: blue-600 border + text, blue-100 pill.</p>
</body></html>
