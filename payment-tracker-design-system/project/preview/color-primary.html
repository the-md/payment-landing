<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div class="swatch-grid">
    <div class="swatch-col"><div class="swatch-chip" style="background:#eff6ff"></div><div class="swatch-label">blue-50</div><div class="swatch-hex">#eff6ff</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#dbeafe"></div><div class="swatch-label">blue-100</div><div class="swatch-hex">#dbeafe</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#60a5fa"></div><div class="swatch-label">blue-400</div><div class="swatch-hex">#60a5fa</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#2563eb"></div><div class="swatch-label" style="color:#2563eb">blue-600 ★</div><div class="swatch-hex">#2563eb</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#1d4ed8"></div><div class="swatch-label">blue-700</div><div class="swatch-hex">#1d4ed8</div></div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Primary accent. blue-600 is the anchor — used for primary buttons, active nav, today indicator, data bars. blue-700 is the single hover step.</p>
</body></html>
