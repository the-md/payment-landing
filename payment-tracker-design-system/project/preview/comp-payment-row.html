<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 18px 24px; background:#f8fafc">
  <div class="demo-card" style="overflow:hidden">
    <div style="padding:12px 14px;border-left:4px solid #f87171;border-bottom:1px solid #f1f5f9">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span class="dot overdue" style="margin-top:6px;flex-shrink:0"></span>
        <div style="flex:1;min-width:0;display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="font-weight:600;color:#0f172a;font-size:14px">ООО "Северный ветер"</div>
          <div style="font-weight:600;color:#0f172a;font-size:14px">85 000 ₽</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 0 18px">
        <span style="font-size:11px;color:#94a3b8">12 фев</span>
        <span style="font-size:11px;color:#cbd5e1">· январь 2026</span>
        <span style="font-size:11px;font-weight:600;color:#dc2626;background:#fef2f2;padding:2px 6px;border-radius:4px">7 дн. просрочено</span>
      </div>
    </div>
    <div style="padding:12px 14px;border-left:4px solid #fde047">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span class="dot pending" style="margin-top:6px;flex-shrink:0"></span>
        <div style="flex:1;min-width:0;display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="font-weight:600;color:#0f172a;font-size:14px">ИП Смирнов А.В.</div>
          <div style="font-weight:600;color:#0f172a;font-size:14px">45 000 ₽</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 0 18px">
        <span style="font-size:11px;color:#94a3b8">22 фев</span>
        <span style="font-size:11px;color:#cbd5e1">· февраль 2026</span>
        <span style="font-size:11px;font-weight:600;color:#a16207;background:#fefce8;padding:2px 6px;border-radius:4px">через 2 дн.</span>
      </div>
    </div>
  </div>
</body></html>
