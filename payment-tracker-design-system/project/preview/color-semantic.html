<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div>
      <div style="font-size:11px;font-weight:600;color:#dc2626;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:6px">Overdue · red</div>
      <div style="display:flex;gap:4px">
        <div class="swatch-chip" style="background:#fef2f2;flex:1"></div>
        <div class="swatch-chip" style="background:#fee2e2;flex:1"></div>
        <div class="swatch-chip" style="background:#ef4444;flex:1"></div>
        <div class="swatch-chip" style="background:#dc2626;flex:1"></div>
      </div>
      <div style="font-size:10px;color:#64748b;margin-top:6px">50 · 100 · 500 · 600</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;color:#a16207;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:6px">Pending · yellow</div>
      <div style="display:flex;gap:4px">
        <div class="swatch-chip" style="background:#fefce8;flex:1"></div>
        <div class="swatch-chip" style="background:#fef9c3;flex:1"></div>
        <div class="swatch-chip" style="background:#facc15;flex:1"></div>
        <div class="swatch-chip" style="background:#ca8a04;flex:1"></div>
      </div>
      <div style="font-size:10px;color:#64748b;margin-top:6px">50 · 100 · 400 · 600</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:600;color:#15803d;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:6px">Paid · green</div>
      <div style="display:flex;gap:4px">
        <div class="swatch-chip" style="background:#f0fdf4;flex:1"></div>
        <div class="swatch-chip" style="background:#dcfce7;flex:1"></div>
        <div class="swatch-chip" style="background:#22c55e;flex:1"></div>
        <div class="swatch-chip" style="background:#16a34a;flex:1"></div>
      </div>
      <div style="font-size:10px;color:#64748b;margin-top:6px">50 · 100 · 500 · 600</div>
    </div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Each semantic color used as a trio: soft-bg (50) · soft-border (100) · dot/accent (400-500) · hover/fg (600-700).</p>
</body></html>
