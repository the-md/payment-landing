<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 18px 24px; background:#f8fafc">
  <div class="demo-card" style="padding:14px;max-width:420px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600;color:#334155">Календарь платежей</div>
      <div style="display:flex;gap:4px;align-items:center">
        <button style="padding:4px;border:0;background:transparent;color:#64748b;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg></button>
        <span style="font-size:12px;font-weight:600;color:#334155;min-width:110px;text-align:center">февраль 2026</span>
        <button style="padding:4px;border:0;background:transparent;color:#64748b;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:10px;font-weight:600;color:#94a3b8;padding:4px 0">
      <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px">
      <div style="padding:4px 0;text-align:center;color:#cbd5e1">26</div>
      <div style="padding:4px 0;text-align:center;color:#cbd5e1">27</div>
      <div style="padding:4px 0;text-align:center;color:#cbd5e1">28</div>
      <div style="padding:4px 0;text-align:center;color:#cbd5e1">29</div>
      <div style="padding:4px 0;text-align:center;color:#cbd5e1">30</div>
      <div style="padding:4px 0;text-align:center;color:#cbd5e1">31</div>
      <div style="padding:4px 0;text-align:center">1</div>
      <div style="padding:4px 0;text-align:center">2</div>
      <div style="padding:4px 0;text-align:center">3</div>
      <div style="padding:4px 0;text-align:center;border:1px solid #fecaca;background:#fef2f2;border-radius:6px"><div>4</div><div style="display:flex;justify-content:center;gap:2px;margin-top:2px"><span class="dot overdue" style="width:4px;height:4px"></span></div></div>
      <div style="padding:4px 0;text-align:center">5</div>
      <div style="padding:4px 0;text-align:center">6</div>
      <div style="padding:4px 0;text-align:center">7</div>
      <div style="padding:4px 0;text-align:center">8</div>
      <div style="padding:4px 0;text-align:center">9</div>
      <div style="padding:4px 0;text-align:center;font-weight:700"><span style="display:inline-block;width:20px;height:20px;background:#2563eb;color:#fff;border-radius:999px;line-height:20px">10</span></div>
      <div style="padding:4px 0;text-align:center">11</div>
      <div style="padding:4px 0;text-align:center">12</div>
      <div style="padding:4px 0;text-align:center;border:1px solid #fef08a;background:#fefce8;border-radius:6px"><div>13</div><div style="display:flex;justify-content:center;gap:2px;margin-top:2px"><span class="dot pending" style="width:4px;height:4px"></span><span class="dot pending" style="width:4px;height:4px"></span></div></div>
      <div style="padding:4px 0;text-align:center">14</div>
      <div style="padding:4px 0;text-align:center">15</div>
      <div style="padding:4px 0;text-align:center">16</div>
      <div style="padding:4px 0;text-align:center">17</div>
      <div style="padding:4px 0;text-align:center;border:1px solid #bbf7d0;background:#f0fdf4;border-radius:6px"><div>18</div><div style="display:flex;justify-content:center;gap:2px;margin-top:2px"><span class="dot paid" style="width:4px;height:4px"></span></div></div>
      <div style="padding:4px 0;text-align:center">19</div>
      <div style="padding:4px 0;text-align:center">20</div>
    </div>
    <div style="display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9">
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#64748b"><span class="dot overdue"></span>просрочен</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#64748b"><span class="dot pending"></span>ожидает</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#64748b"><span class="dot paid"></span>оплачен</span>
    </div>
  </div>
</body></html>
