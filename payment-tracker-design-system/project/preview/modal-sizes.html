<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 24px">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:11px;font-weight:700;color:#2563eb">SMALL</div>
      <div style="font-size:18px;font-weight:700;color:#0f172a;margin:4px 0">max-w-sm</div>
      <div style="font-size:11px;color:#64748b">384px · confirm-диалоги</div>
      <div style="font-size:10px;color:#94a3b8;margin-top:8px">«Удалить?» «Отметить?»</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:11px;font-weight:700;color:#2563eb">MEDIUM</div>
      <div style="font-size:18px;font-weight:700;color:#0f172a;margin:4px 0">max-w-md</div>
      <div style="font-size:11px;color:#64748b">448px · простые формы</div>
      <div style="font-size:10px;color:#94a3b8;margin-top:8px">1 колонка · 4-6 полей</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:11px;font-weight:700;color:#2563eb">LARGE</div>
      <div style="font-size:18px;font-weight:700;color:#0f172a;margin:4px 0">max-w-2xl</div>
      <div style="font-size:11px;color:#64748b">672px · сложные формы</div>
      <div style="font-size:10px;color:#94a3b8;margin-top:8px">2 колонки · детали</div>
    </div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Всегда <code>rounded-2xl shadow-xl</code>, overlay <code>bg-black/40</code>. Больше 2xl — это страница, не модалка.</p>
</body></html>
