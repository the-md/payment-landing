<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px; background:#f8fafc">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    <div style="padding:20px;border-radius:12px;background:#eff6ff;border:1px solid #dbeafe">
      <p style="font-size:13px;font-weight:600;color:#475569;margin:0">Всего клиентов</p>
      <p style="font-size:24px;font-weight:700;color:#1d4ed8;margin:4px 0 0">24</p>
      <p style="font-size:11px;color:#94a3b8;margin:4px 0 0">18 активных</p>
    </div>
    <div style="padding:20px;border-radius:12px;background:#fefce8;border:1px solid #fef9c3">
      <p style="font-size:13px;font-weight:600;color:#475569;margin:0">Ожидается (30 дн.)</p>
      <p style="font-size:24px;font-weight:700;color:#a16207;margin:4px 0 0">1 240 000 ₽</p>
      <p style="font-size:11px;color:#94a3b8;margin:4px 0 0">к поступлению</p>
    </div>
    <div style="padding:20px;border-radius:12px;background:#fef2f2;border:1px solid #fee2e2">
      <p style="font-size:13px;font-weight:600;color:#475569;margin:0">Просрочено</p>
      <p style="font-size:24px;font-weight:700;color:#b91c1c;margin:4px 0 0">3</p>
      <p style="font-size:11px;color:#94a3b8;margin:4px 0 0">185 000 ₽</p>
    </div>
  </div>
</body></html>
