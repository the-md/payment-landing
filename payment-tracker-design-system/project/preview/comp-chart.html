<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 16px; background:#f8fafc">
  <div class="demo-card" style="padding:18px">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:#334155">График поступлений</div>
      <div style="font-size:12px;color:#64748b">Итого: 2 840 000 ₽</div>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:12px">
      <button style="padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:0;background:#2563eb;color:#fff;cursor:pointer">Месяц</button>
      <button style="padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:0;background:transparent;color:#64748b;cursor:pointer">Квартал</button>
      <button style="padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:0;background:transparent;color:#64748b;cursor:pointer">Год</button>
    </div>
    <svg width="100%" height="120" viewBox="0 0 500 120">
      <g fill="#2563eb">
        <rect x="10"  y="60"  width="40" height="60"  rx="3"/>
        <rect x="70"  y="40"  width="40" height="80"  rx="3"/>
        <rect x="130" y="20"  width="40" height="100" rx="3"/>
        <rect x="190" y="55"  width="40" height="65"  rx="3"/>
        <rect x="250" y="30"  width="40" height="90"  rx="3"/>
        <rect x="310" y="10"  width="40" height="110" rx="3"/>
        <rect x="370" y="45"  width="40" height="75"  rx="3"/>
        <rect x="430" y="25"  width="40" height="95"  rx="3"/>
      </g>
    </svg>
  </div>
  <p style="font-size:11px;color:#64748b;margin:10px 0 0">Recharts BarChart · <code>fill="#2563eb"</code> · <code>radius=[4,4,0,0]</code>. Axis ticks #94a3b8.</p>
</body></html>
