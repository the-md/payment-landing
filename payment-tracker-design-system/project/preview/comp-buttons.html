<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="demo-btn primary">Добавить клиента</button>
    <button class="demo-btn primary" disabled>...</button>
    <button class="demo-btn ghost">Отмена</button>
    <button class="demo-btn danger">Удалить</button>
    <button class="demo-btn primary sm">Отметить</button>
    <button class="demo-btn ghost sm">Ещё</button>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Primary · ghost · danger. Sizes md/sm. <code>rounded-lg font-semibold transition-colors</code>. Hover darkens one step (blue-600→700, red-600→700). Loading swaps children for <code>"..."</code>.</p>
</body></html>
