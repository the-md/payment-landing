<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div class="swatch-grid" style="grid-template-columns: repeat(10, 1fr); gap:6px;">
    <div class="swatch-col"><div class="swatch-chip" style="background:#f8fafc;height:48px"></div><div class="swatch-label">50</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#f1f5f9;height:48px"></div><div class="swatch-label">100</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#e2e8f0;height:48px"></div><div class="swatch-label">200</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#cbd5e1;height:48px"></div><div class="swatch-label">300</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#94a3b8;height:48px"></div><div class="swatch-label">400</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#64748b;height:48px"></div><div class="swatch-label" style="color:#fff">500</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#475569;height:48px"></div><div class="swatch-label" style="color:#fff">600</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#334155;height:48px"></div><div class="swatch-label" style="color:#fff">700</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#1e293b;height:48px"></div><div class="swatch-label" style="color:#fff">800</div></div>
    <div class="swatch-col"><div class="swatch-chip" style="background:#0f172a;height:48px"></div><div class="swatch-label" style="color:#fff">900</div></div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Neutral spine. slate-50 is the app canvas; slate-200 is the universal border; 400/500 is metadata; 700/900 is text.</p>
</body></html>
