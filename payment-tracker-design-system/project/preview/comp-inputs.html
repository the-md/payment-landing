<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div style="display:flex;flex-direction:column;gap:12px">
    <input placeholder="Поиск по имени..." style="padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none" />
    <div style="display:flex;gap:10px">
      <select style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;font-family:inherit">
        <option>Все статусы</option><option>Активные</option><option>Приостановленные</option>
      </select>
      <input placeholder="Укажите сумму" style="flex:1;padding:8px 12px;border:1px solid #2563eb;border-radius:8px;font-size:13px;outline:none;box-shadow:0 0 0 2px rgba(37,99,235,0.2);font-family:inherit" />
    </div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Inputs + selects: <code>border-slate-200 rounded-lg</code>, <code>focus:ring-2 focus:ring-blue-500</code>.</p>
</body></html>
