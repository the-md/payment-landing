<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 24px; background: #f8fafc;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;text-align:center">
      <div class="mono" style="margin-top:18px">border only</div>
      <div style="font-size:10px;color:#94a3b8">default card</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05)">
      <div class="mono" style="margin-top:18px">shadow-sm</div>
      <div style="font-size:10px;color:#94a3b8">chart card</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;text-align:center;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1),0 4px 6px -4px rgb(0 0 0 / 0.1)">
      <div class="mono" style="margin-top:18px">shadow-lg</div>
      <div style="font-size:10px;color:#94a3b8">login</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;text-align:center;box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1),0 8px 10px -6px rgb(0 0 0 / 0.1)">
      <div class="mono" style="margin-top:18px">shadow-xl</div>
      <div style="font-size:10px;color:#94a3b8">dialog</div>
    </div>
  </div>
</body></html>
