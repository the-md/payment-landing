<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
    <span class="badge active">Активный</span>
    <span class="badge paused">Приостановлен</span>
    <span class="badge completed">Завершён</span>
    <span class="badge paid">Оплачено</span>
    <span class="badge pending">Ожидается</span>
    <span class="badge overdue">Просрочено</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <span style="font-size:11px;font-weight:600;color:#dc2626;background:#fef2f2;padding:2px 6px;border-radius:4px">5 дн. просрочено</span>
    <span style="font-size:11px;font-weight:600;color:#a16207;background:#fefce8;padding:2px 6px;border-radius:4px">через 3 дн.</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#475569"><span class="dot pending"></span>ожидает</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#475569"><span class="dot overdue"></span>просрочен</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#475569"><span class="dot paid"></span>оплачен</span>
  </div>
</body></html>
