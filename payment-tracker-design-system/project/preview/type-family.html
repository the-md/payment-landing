<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 20px 24px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

    <div style="font-family:Inter;font-weight:600;font-size:16px;color:#0f172a">Semibold 600</div>
    <div style="font-family:Inter;font-weight:700;font-size:16px;color:#0f172a">Bold 700</div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Inter, subsets latin + cyrillic, via <code>next/font/google</code>.</p>
