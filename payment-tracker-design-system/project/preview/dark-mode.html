<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:16px;background:#020617;color:#f8fafc">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div style="padding:14px;border-radius:12px;background:#0f172a;border:1px solid #1e293b">
      <div style="font-size:11px;font-weight:600;color:#cbd5e1">Карточка</div>
      <div style="font-size:10px;color:#64748b;margin-top:4px">slate-900 / border-800</div>
    </div>
    <div style="padding:14px;border-radius:12px;background:#2563eb;color:#fff">
      <div style="font-size:11px;font-weight:600">Primary</div>
      <div style="font-size:10px;opacity:.7;margin-top:4px">blue-500 в dark</div>
    </div>
    <div style="padding:14px;border-radius:12px;background:rgba(22,101,52,0.25);border:1px solid rgba(22,101,52,0.5)">
      <div style="font-size:11px;font-weight:600;color:#86efac">Оплачено</div>
      <div style="font-size:10px;color:#4ade80;margin-top:4px">green-950/40</div>
    </div>
    <div style="padding:14px;border-radius:12px;background:rgba(127,29,29,0.25);border:1px solid rgba(127,29,29,0.5)">
      <div style="font-size:11px;font-weight:600;color:#fca5a5">Просрочено</div>
      <div style="font-size:10px;color:#f87171;margin-top:4px">red-950/40</div>
    </div>
  </div>
  <p style="font-size:11px;color:#94a3b8;margin:12px 0 0">Стратегия <code>class="dark"</code>. Границы вместо теней. Soft-варианты — <code>color-950/40</code>.</p>
</body></html>
