<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding: 16px; background:rgba(0,0,0,0.4);height:200px;display:flex;align-items:center;justify-content:center">
  <div class="demo-card" style="padding:22px;max-width:360px;width:100%;box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.2),0 8px 10px -6px rgb(0 0 0 / 0.2)">
    <h3 style="font-size:15px;font-weight:600;color:#0f172a;margin:0 0 8px">Удалить клиента?</h3>
    <p style="font-size:13px;color:#475569;margin:0 0 16px">Все связанные платежи также будут удалены. Действие нельзя отменить.</p>
    <div style="display:flex;gap:10px">
      <button class="demo-btn danger" style="flex:1">Удалить</button>
      <button class="demo-btn ghost" style="flex:1">Отмена</button>
    </div>
  </div>
</body></html>
