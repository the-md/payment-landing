<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.sk{background:#e2e8f0;border-radius:4px;animation:p 1.5s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.5}}</style>
</head>
<body style="padding:16px 24px;background:#f8fafc">
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:16px;padding:14px;background:#fff;border:1px solid #e2e8f0;border-radius:12px">
      <div class="sk" style="width:40px;height:40px;border-radius:999px"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="sk" style="height:14px;width:35%"></div>
        <div class="sk" style="height:12px;width:55%"></div>
      </div>
      <div class="sk" style="height:18px;width:80px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;padding:14px;background:#fff;border:1px solid #e2e8f0;border-radius:12px">
      <div class="sk" style="width:40px;height:40px;border-radius:999px"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="sk" style="height:14px;width:45%"></div>
        <div class="sk" style="height:12px;width:40%"></div>
      </div>
      <div class="sk" style="height:18px;width:70px"></div>
    </div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:12px 0 0">Skeleton повторяет форму контента. <code>animate-pulse</code>. Длины полос варьируются 35–90%.</p>
</body></html>
