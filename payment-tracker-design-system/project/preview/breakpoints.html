<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:16px 24px">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;text-align:center">
    <div><div style="height:50px;background:#dbeafe;border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;color:#1d4ed8;font-weight:600">sm</div><div style="font-size:10px;color:#64748b;margin-top:4px">640px</div></div>
    <div><div style="height:50px;background:#dbeafe;border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;color:#1d4ed8;font-weight:600">md</div><div style="font-size:10px;color:#64748b;margin-top:4px">768px · планшет</div></div>
    <div><div style="height:50px;background:#bfdbfe;border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;color:#1d4ed8;font-weight:600">lg</div><div style="font-size:10px;color:#64748b;margin-top:4px">1024px</div></div>
    <div><div style="height:50px;background:#93c5fd;border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;color:#1d4ed8;font-weight:600">xl</div><div style="font-size:10px;color:#64748b;margin-top:4px">1280px · desktop</div></div>
    <div><div style="height:50px;background:#60a5fa;border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;color:#fff;font-weight:600">2xl</div><div style="font-size:10px;color:#64748b;margin-top:4px">1536px</div></div>
  </div>
  <p style="font-size:11px;color:#64748b;margin:14px 0 0">Ключевой переход — <code>md</code>: sidebar → bottom tab bar. Mobile-first, hit target ≥44px.</p>
</body></html>
